<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker - UI Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        .stat-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <nav class="glass-card sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg">
                        <i class="fas fa-briefcase text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold gradient-text">Job Tracker</h1>
                        <p class="text-xs text-gray-500">Track your career journey</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Statistics -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 mb-8">
            <div class="stat-card glass-card rounded-2xl p-5 border-l-4 border-gray-400">
                <div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center mb-2">
                    <i class="fas fa-list text-gray-600"></i>
                </div>
                <div class="text-gray-600 text-xs font-medium uppercase">Total</div>
                <div class="text-3xl font-bold text-gray-900 mt-1">24</div>
            </div>
            <div class="stat-card glass-card rounded-2xl p-5 border-l-4 border-yellow-400">
                <div class="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center mb-2">
                    <i class="fas fa-clock text-yellow-600"></i>
                </div>
                <div class="text-gray-600 text-xs font-medium uppercase">Pending</div>
                <div class="text-3xl font-bold text-yellow-600 mt-1">5</div>
            </div>
            <div class="stat-card glass-card rounded-2xl p-5 border-l-4 border-blue-400">
                <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mb-2">
                    <i class="fas fa-paper-plane text-blue-600"></i>
                </div>
                <div class="text-gray-600 text-xs font-medium uppercase">Applied</div>
                <div class="text-3xl font-bold text-blue-600 mt-1">12</div>
            </div>
            <div class="stat-card glass-card rounded-2xl p-5 border-l-4 border-purple-400">
                <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center mb-2">
                    <i class="fas fa-user-tie text-purple-600"></i>
                </div>
                <div class="text-gray-600 text-xs font-medium uppercase">HRD</div>
                <div class="text-3xl font-bold text-purple-600 mt-1">3</div>
            </div>
            <div class="stat-card glass-card rounded-2xl p-5 border-l-4 border-indigo-400">
                <div class="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center mb-2">
                    <i class="fas fa-users text-indigo-600"></i>
                </div>
                <div class="text-gray-600 text-xs font-medium uppercase">User</div>
                <div class="text-3xl font-bold text-indigo-600 mt-1">2</div>
            </div>
            <div class="stat-card glass-card rounded-2xl p-5 border-l-4 border-red-400">
                <div class="w-10 h-10 bg-red-100 rounded-lg flex items-center justify-center mb-2">
                    <i class="fas fa-times-circle text-red-600"></i>
                </div>
                <div class="text-gray-600 text-xs font-medium uppercase">Rejected</div>
                <div class="text-3xl font-bold text-red-600 mt-1">1</div>
            </div>
            <div class="stat-card glass-card rounded-2xl p-5 border-l-4 border-green-400">
                <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mb-2">
                    <i class="fas fa-check-circle text-green-600"></i>
                </div>
                <div class="text-gray-600 text-xs font-medium uppercase">Accepted</div>
                <div class="text-3xl font-bold text-green-600 mt-1">1</div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 shadow-xl text-center">
            <i class="fas fa-check-circle text-6xl text-green-500 mb-4"></i>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">UI Preview Ready! ✨</h2>
            <p class="text-gray-600 mb-4">Modern, aesthetic design dengan gradient & glass morphism</p>
            <div class="flex justify-center gap-4">
                <span class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg font-medium">Gradient Backgrounds</span>
                <span class="px-4 py-2 bg-purple-100 text-purple-700 rounded-lg font-medium">Glass Morphism</span>
                <span class="px-4 py-2 bg-green-100 text-green-700 rounded-lg font-medium">Smooth Animations</span>
            </div>
        </div>
    </div>
</body>
</html>
